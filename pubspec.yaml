name: color_generator
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  bloc: ^9.2.0
  collection: ^1.19.1
  cupertino_icons: ^1.0.8

  drift: ^2.31.0
  drift_flutter: ^0.2.8
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.2.2
  json_annotation: ^4.9.0
  lottie: ^3.3.3
  shared_preferences: ^2.5.5
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.31.0
  flutter_gen_runner: ^5.14.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  solid_lints: any

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/

flutter_gen:
  output: lib/gen/
  line_length: 80

  integrations:
    image: true
    lottie: true